databases:
  - name: ai-god-db
    plan: free
    databaseName: aigoddb
    user: aigoduser

services:
  - type: web
    name: ai-god-website
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-god-db
          property: connectionString
      - key: SECRET_KEY
        value: RUHIVIGQNR